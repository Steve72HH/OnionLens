name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose --env-file .env.example config
          rm .env

      - name: Check release hygiene
        shell: bash
        run: |
          test ! -f .env
          test ! -d backups
          ! find . -name '*.pyc' -o -name '__pycache__' | grep -q .
          ! find . -name '*.sql.gz' -o -name '*.dump' | grep -q .

      - name: Compile Python
        run: python -m compileall backend crawler indexer tools

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
