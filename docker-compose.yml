services:
  tor:
    image: dperson/torproxy
    restart: unless-stopped

  db:
    image: postgres:16
    shm_size: "1gb"
    container_name: onionlens-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PUBLISH_HOST:-127.0.0.1}:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: onionlens-search
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    ports:
      - "${MEILI_PUBLISH_HOST:-127.0.0.1}:${MEILI_PORT:-7700}:7700"

  backend:
    build: ./backend
    container_name: onionlens-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PUBLISH_HOST:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  crawler:
    build: ./crawler
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./crawler/seeds.txt:/app/seeds.txt:ro
      - ./seed_sources:/app/seed_sources:ro
    depends_on:
      db:
        condition: service_healthy
      tor:
        condition: service_started

  indexer:
    build: ./indexer
    container_name: onionlens-indexer
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  tools:
    build: ./tools
    profiles: ["tools"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: onionlens-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  db_data:
  meili_data:
